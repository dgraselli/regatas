name = "regatas-metar"
main = "metar.js"
compatibility_date = "2024-11-01"
workers_dev = false

# El sitio corre en GitHub Pages con el apex en DNS-only (no proxeado por
# Cloudflare), así que una Route sobre regatas.com.ar NO intercepta. En su lugar,
# el Worker vive en su propio subdominio (Custom Domain), y la app lo llama
# cross-origin: el Worker responde con CORS (Access-Control-Allow-Origin del sitio).
# wrangler crea el DNS + cert de api.regatas.com.ar (la zona ya está en Cloudflare).
routes = [
  { pattern = "api.regatas.com.ar", custom_domain = true }
]
