name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy oficial de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; cancela los viejos en curso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Usa las APIs reales (Open-Meteo) en el sitio publicado, no los mocks.
      NEXT_PUBLIC_USE_MOCKS: 'false'
      # Analítica (Umami) y feedback (Tally). El Website ID de Umami es público
      # (va en el <script> del sitio), así que se deja como default; se puede
      # sobreescribir en Settings → Secrets and variables → Actions → Variables.
      NEXT_PUBLIC_UMAMI_SRC: ${{ vars.NEXT_PUBLIC_UMAMI_SRC || 'https://cloud.umami.is/script.js' }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID || '5072e63d-c5b4-4813-84c6-8e63abccf357' }}
      NEXT_PUBLIC_FEEDBACK_URL: ${{ vars.NEXT_PUBLIC_FEEDBACK_URL || 'https://tally.so/r/D4bxkE' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Evita que Jekyll ignore la carpeta _next/ de Next.js.
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
